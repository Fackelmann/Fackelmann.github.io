<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daniel G. Plaza</title>
  <meta name="description" content="Personal domain of Daniel G. Plaza, software engineer in the Bay Area.">
  <meta property="og:title" content="Daniel G. Plaza">
  <meta property="og:description" content="Personal domain of Daniel G. Plaza, software engineer in the Bay Area.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://danielgplaza.com/">
  <link rel="canonical" href="https://danielgplaza.com/">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fbfaf7;
      --fg: #202428;
      --muted: #66717b;
      --line: #ded8ce;
      --link: #165f92;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111315;
        --fg: #eeeeec;
        --muted: #a3abb3;
        --line: #343a40;
        --link: #8bc7ff;
      }
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      line-height: 1.6;
    }

    main {
      width: min(38rem, calc(100vw - 2rem));
      margin: 0 auto;
      padding: clamp(4.5rem, 15vh, 9rem) 0 3rem;
    }

    h1 {
      margin: 0 0 .5rem;
      font-size: clamp(2.35rem, 8vw, 4.4rem);
      line-height: 1;
      letter-spacing: -0.055em;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 2.25rem;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(1.02rem, 2vw, 1.2rem);
    }

    .body-copy {
      max-width: 31rem;
      margin: 0 0 1.75rem;
      font-size: 1.08rem;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem 1.1rem;
      margin: 2rem 0 0;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .96rem;
    }

    a {
      color: var(--link);
      text-decoration-thickness: .08em;
      text-underline-offset: .18em;
    }

    a:hover { text-decoration-thickness: .14em; }

    .domain-note {
      max-width: 31rem;
      margin-top: 2rem;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: .9rem;
    }

    @media (max-width: 520px) {
      main { padding-top: 4rem; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Daniel G. Plaza</h1>
    <p class="subtitle">Software engineer in the Bay Area.</p>

    <p class="body-copy">
      This is my personal domain: mostly email, small projects,
      and occasional writing.
    </p>

    <nav aria-label="Links">
      <a href="https://github.com/Fackelmann" rel="me">GitHub</a>
      <a href="https://linkedin.com/in/daniel-gonzalez-plaza" rel="me">LinkedIn</a>
    </nav>

    <p class="domain-note">
      If you are here because you received email from this domain: yes, this is my domain.
    </p>
  </main>
</body>
</html>
